---
layout: default
---

<header class="page-header">
    <h1 class="page-title">
        <a href="{{ site.baseurl }}/journal">Journal</a>
    </h1>
</header>

<div class="content-wrapper">
    <div class="breadcrumbs">
        <a href="{{ site.url }}/home">ParaPups</a> &gt;&gt; <a href="{{ site.baseurl }}/journal">Journal</a> &gt;&gt; {{ page.title }}
    </div>

    <main>
        <article class="text-wrapper post-wrapper" itemscope itemtype="http://schema.org/BlogPosting">

          <header class="post-header">
            <h1 class="post-title" itemprop="name headline">{{ page.title }}</h1>
            <span class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">{{ page.date | date: "%b %-d, %Y" }}</time>{% if page.author %} • <span itemprop="author" itemscope itemtype="http://schema.org/Person"><span itemprop="name">{{ page.author }}</span></span>{% endif %}</span>
          </header>

          <div class="content" itemprop="articleBody">
            {{ content }}
          </div>

        </article>
    </main>
</div>
